<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Camera</title>
    <style>
        :root {
            --ios-yellow: #ffcc00;
            --ios-red: #ff3b30;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* Viewport & Focus */
        #camera-wrapper {
            position: relative; flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: crosshair;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        #focus-ring {
            position: absolute; width: 70px; height: 70px;
            border: 1.5px solid var(--ios-yellow);
            display: none; pointer-events: none;
            transition: transform 0.2s ease-out;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* UI Elements */
        .bottom-ui { background: black; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .mode-switcher { display: flex; gap: 25px; padding: 15px; font-size: 13px; font-weight: 700; }
        .mode { color: #888; transition: 0.3s; cursor: pointer; }
        .mode.active { color: var(--ios-yellow); }

        .shutter-row {
            width: 100%; display: flex; justify-content: space-evenly; align-items: center;
        }

        /* Gallery Thumbnail */
        .gallery-thumb {
            width: 50px; height: 50px; border-radius: 4px;
            background: #222; overflow: hidden; cursor: pointer;
            border: 1px solid #444;
        }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Shutter Button */
        .shutter-btn {
            width: 76px; height: 76px; border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
            background: transparent;
        }
        .shutter-inner {
            width: 62px; height: 62px; border-radius: 50%;
            background: white; transition: 0.2s;
        }
        .video-mode .shutter-inner { background: var(--ios-red); }
        .recording .shutter-inner { border-radius: 10px; transform: scale(0.6); }

        .flip-btn {
            background: #222; border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Fullscreen Gallery Overlay */
        #gallery-overlay {
            position: fixed; inset: 0; background: black;
            display: none; flex-direction: column; z-index: 100;
        }
        #gallery-header { padding: 20px; display: flex; justify-content: space-between; font-weight: 600; }
        #gallery-content {
            flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; overflow-y: auto; padding: 2px;
        }
        .grid-item { aspect-ratio: 1/1; width: 100%; object-fit: cover; background: #111; }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="focus-ring"></div>
        <div id="recording-timer" style="position:absolute; top:20px; display:none; color:red; font-weight:bold;">REC 00:00</div>
    </div>

    <div class="bottom-ui">
        <div class="mode-switcher">
            <span id="mode-photo" class="mode active">PHOTO</span>
            <span id="mode-video" class="mode">VIDEO</span>
        </div>

        <div class="shutter-row">
            <div class="gallery-thumb" id="open-gallery">
                <img id="recent-img" src="" style="display:none;">
            </div>
            
            <div class="shutter-btn" id="shutter">
                <div class="shutter-inner"></div>
            </div>

            <button class="flip-btn" id="flip-cam">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
            </button>
        </div>
    </div>

    <div id="gallery-overlay">
        <div id="gallery-header">
            <span onclick="closeGallery()" style="color: var(--ios-yellow); cursor:pointer;">Done</span>
            <span>All Photos</span>
            <span style="opacity:0">Done</span>
        </div>
        <div id="gallery-content"></div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const video = document.getElementById('video');
        const wrapper = document.getElementById('camera-wrapper');
        const focusRing = document.getElementById('focus-ring');
        const shutter = document.getElementById('shutter');
        const galleryOverlay = document.getElementById('gallery-overlay');
        const galleryContent = document.getElementById('gallery-content');
        const recentImg = document.getElementById('recent-img');

        let stream = null;
        let mode = 'photo';
        let isFront = true;
        let mediaRecorder;
        let chunks = [];
        let photos = [];

        // 1. Lifecycle Management (Stop camera when leaving)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopCamera();
            else startCamera();
        });

        async function startCamera() {
            if (stream) stopCamera();
            const constraints = { 
                video: { facingMode: isFront ? "user" : "environment", focusMode: "continuous" },
                audio: mode === 'video'
            };
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.style.transform = isFront ? "scaleX(-1)" : "none";
            } catch (e) { console.error(e); }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        // 2. Focus System
        wrapper.onclick = (e) => {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - 35;
            const y = e.clientY - rect.top - 35;

            focusRing.style.display = 'block';
            focusRing.style.left = `${x}px`;
            focusRing.style.top = `${y}px`;
            focusRing.style.transform = 'scale(1.5)';
            
            setTimeout(() => { focusRing.style.transform = 'scale(1)'; }, 10);
            setTimeout(() => { focusRing.style.display = 'none'; }, 1000);

            // Attempt hardware focus if supported
            const track = stream.getVideoTracks()[0];
            if (track.getCapabilities().focusMode) {
                track.applyConstraints({ advanced: [{ pointsOfInterest: [{x: e.clientX/rect.width, y: e.clientY/rect.height}] }] });
            }
        };

        // 3. Shutter & Storage (No Popups)
        shutter.onclick = () => {
            if (mode === 'photo') {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                if (isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
                ctx.drawImage(video, 0, 0);
                
                const data = canvas.toDataURL('image/jpeg');
                saveToGallery(data);
            } else {
                toggleRecording();
            }
        };

        function saveToGallery(dataUrl) {
            photos.push(dataUrl);
            recentImg.src = dataUrl;
            recentImg.style.display = 'block';
            // Note: We don't call click() on a link here, so no "Save As" popup appears.
        }

        // 4. Mode Switching
        document.getElementById('mode-photo').onclick = () => { mode = 'photo'; updateUI(); };
        document.getElementById('mode-video').onclick = () => { mode = 'video'; updateUI(); };
        document.getElementById('flip-cam').onclick = () => { isFront = !isFront; startCamera(); };

        function updateUI() {
            document.body.classList.toggle('video-mode', mode === 'video');
            document.getElementById('mode-photo').classList.toggle('active', mode === 'photo');
            document.getElementById('mode-video').classList.toggle('active', mode === 'video');
            startCamera(); 
        }

        // 5. Built-in Gallery Logic
        document.getElementById('open-gallery').onclick = () => {
            galleryContent.innerHTML = '';
            photos.slice().reverse().forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'grid-item';
                img.onclick = () => { // Option to download from inside gallery if desired
                    const a = document.createElement('a');
                    a.href = src; a.download = 'capture.jpg'; a.click();
                };
                galleryContent.appendChild(img);
            });
            galleryOverlay.style.display = 'flex';
        };

        window.closeGallery = () => { galleryOverlay.style.display = 'none'; };

        // Initial Start
        startCamera();
    </script>
</body>
</html>
