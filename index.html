<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCamera Web</title>
    <style>
        :root {
            --ios-yellow: #ffcc00;
            --ios-red: #ff3b30;
        }

        body {
            margin: 0;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Viewport */
        #camera-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom Controls Area */
        .bottom-ui {
            background: rgba(0, 0, 0, 0.9);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Mode Switcher */
        .mode-switcher {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .mode { color: #888; cursor: pointer; }
        .mode.active { color: var(--ios-yellow); }

        /* Shutter & Actions */
        .shutter-row {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0 40px 0;
        }

        .gallery-preview {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: #333;
            overflow: hidden;
            border: 1px solid #444;
        }

        .gallery-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* iPhone Shutter Button */
        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            cursor: pointer;
        }

        .shutter-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: white;
            transition: all 0.2s ease;
        }

        /* Video Mode Styling */
        body.video-mode .shutter-inner { background: var(--ios-red); }
        body.recording .shutter-inner { border-radius: 8px; transform: scale(0.6); }

        .flip-btn {
            background: #333;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #recording-timer {
            position: absolute;
            top: 40px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <div id="recording-timer">00:00</div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="bottom-ui">
        <div class="mode-switcher">
            <span class="mode active" onclick="setMode('photo')">PHOTO</span>
            <span class="mode" onclick="setMode('video')">VIDEO</span>
        </div>

        <div class="shutter-row">
            <div class="gallery-preview" id="gallery-trigger">
                <img id="last-shot" src="" style="display:none">
            </div>
            
            <div class="shutter-btn" id="shutter">
                <div class="shutter-inner"></div>
            </div>

            <button class="flip-btn" id="flip-cam">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l-4.4 4.4L3 15V9h6l-1.4 1.4L9 12zm3-9.3V5h6v6l-1.4-1.4-4.6 4.6 4.4 4.4L15 21v-6h-6l1.4 1.4-1.4 1.4L3 12.3V19h18V3h-9z"/></svg>
            </button>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        let currentMode = 'photo';
        let useFrontCamera = true;
        let mediaRecorder;
        let recordedChunks = [];
        let stream;

        const video = document.getElementById('video');
        const shutter = document.getElementById('shutter');
        const lastShot = document.getElementById('last-shot');
        const timer = document.getElementById('recording-timer');

        async function startCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            
            const constraints = {
                video: { facingMode: useFrontCamera ? "user" : "environment" },
                audio: true
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                // Mirror only front camera
                video.style.transform = useFrontCamera ? 'scaleX(-1)' : 'scaleX(1)';
            } catch (err) {
                console.error("Camera error:", err);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.body.classList.toggle('video-mode', mode === 'video');
            document.querySelectorAll('.mode').forEach(el => {
                el.classList.toggle('active', el.innerText.toLowerCase() === mode);
            });
        }

        document.getElementById('flip-cam').onclick = () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        };

        shutter.onclick = () => {
            if (currentMode === 'photo') {
                takePhoto();
            } else {
                toggleRecording();
            }
        };

        function takePhoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            if (useFrontCamera) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0);
            
            const imgData = canvas.toDataURL('image/jpeg');
            updateGallery(imgData);
        }

        function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.body.classList.remove('recording');
                timer.style.display = 'none';
            } else {
                startRecording();
            }
        }

        function startRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: "video/mp4" });
                const url = URL.createObjectURL(blob);
                updateGallery(url, true);
            };
            mediaRecorder.start();
            document.body.classList.add('recording');
            timer.style.display = 'block';
        }

        function updateGallery(url, isVideo = false) {
            lastShot.src = url; // Note: videos need a thumbnail, for now we just show the URL source
            lastShot.style.display = 'block';
            
            // Auto download (iPhone style doesn't do this, but helpful for web)
            const a = document.createElement('a');
            a.href = url;
            a.download = isVideo ? 'video.mp4' : 'photo.jpg';
            a.click();
        }

        startCamera();
    </script>
</body>
</html>
