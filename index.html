<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera</title>
    <style>
        :root {
            --ios-yellow: #ffcc00;
            --ios-red: #ff3b30;
            --ios-bg: #000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: var(--ios-bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* Top Bar */
        .top-bar {
            height: 60px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; z-index: 10;
        }

        /* Viewport */
        #camera-wrapper {
            position: relative; flex-grow: 1;
            width: 100%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }

        /* iOS Focus Square */
        #focus-square {
            position: absolute; width: 65px; height: 65px;
            border: 1px solid var(--ios-yellow); display: none;
            pointer-events: none; transition: transform 0.2s ease;
        }
        #focus-square::after {
            content: ''; position: absolute; top: -5px; left: 50%;
            width: 1px; height: 5px; background: var(--ios-yellow);
        }

        /* Bottom Control Panel */
        .bottom-ui {
            background: black; padding-bottom: 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Mode Selector - Sliding Style */
        .mode-container {
            width: 100%; overflow: hidden; padding: 15px 0;
            display: flex; justify-content: center; align-items: center;
        }
        .mode-list {
            display: flex; gap: 20px; font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode { color: #999; cursor: pointer; }
        .mode.active { color: var(--ios-yellow); }

        /* Main Shutter Row */
        .shutter-row {
            width: 100%; display: flex; justify-content: space-around; align-items: center;
        }

        .thumb-link {
            width: 48px; height: 48px; border-radius: 50%;
            background: #222; overflow: hidden; border: none;
        }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; }

        .shutter-btn {
            width: 78px; height: 78px; border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
        }
        .shutter-inner {
            width: 64px; height: 64px; border-radius: 50%;
            background: white; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .video-active .shutter-inner { background: var(--ios-red); }
        .recording .shutter-inner { border-radius: 10px; transform: scale(0.55); }

        .flip-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: #1c1c1e; display: flex; align-items: center; justify-content: center;
        }

        /* Gallery Overlay */
        #gallery-view {
            position: fixed; inset: 0; background: black;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; display: flex; flex-direction: column;
        }
        #gallery-view.open { transform: translateY(0); }

        .gallery-nav {
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 0.5px solid #333;
        }

        #grid-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; overflow-y: auto; padding: 2px;
        }
        .grid-img { width: 100%; aspect-ratio: 1; object-fit: cover; }

        /* Fullscreen Photo Viewer */
        #photo-viewer {
            position: fixed; inset: 0; background: black; z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        #photo-viewer img { max-width: 100%; max-height: 100%; }
        #close-viewer { position: absolute; top: 40px; left: 20px; font-weight: bold; }
    </style>
</head>
<body class="photo-active">

    <div class="top-bar">
        <span><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg></span>
        <span id="timer" style="display:none; color:white; font-variant-numeric: tabular-nums;">00:00</span>
        <span><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></span>
    </div>

    <div id="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="focus-square"></div>
    </div>

    <div class="bottom-ui">
        <div class="mode-container">
            <div class="mode-list">
                <span class="mode" onclick="switchMode('video')">VIDEO</span>
                <span class="mode active" onclick="switchMode('photo')">PHOTO</span>
                <span class="mode">PORTRAIT</span>
            </div>
        </div>

        <div class="shutter-row">
            <button class="thumb-link" id="btn-gallery">
                <img id="latest-thumb" src="" style="display:none">
            </button>

            <div class="shutter-btn" id="shutter">
                <div class="shutter-inner"></div>
            </div>

            <div class="flip-icon" id="btn-flip">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M16 7h-8l3-3h2l3 3zm-3 14h-2l-3-3h8l-3 3zm5-9c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6 6 2.69 6 6z"/></svg>
            </div>
        </div>
    </div>

    <div id="gallery-view">
        <div class="gallery-nav">
            <span style="color:var(--ios-yellow)" onclick="toggleGallery(false)">Done</span>
            <span style="font-weight:700">All Photos</span>
            <span style="color:var(--ios-yellow)">Select</span>
        </div>
        <div id="grid-container"></div>
    </div>

    <div id="photo-viewer">
        <span id="close-viewer">✕</span>
        <img id="full-img" src="">
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const video = document.getElementById('video');
        const shutter = document.getElementById('shutter');
        const galleryView = document.getElementById('gallery-view');
        const grid = document.getElementById('grid-container');
        const latestThumb = document.getElementById('latest-thumb');
        
        let stream, recorder, chunks = [];
        let isFront = true, mode = 'photo', isRecording = false;
        let photos = [];

        // 1. Camera Engine
        async function initCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: isFront ? "user" : "environment" },
                    audio: true
                });
                video.srcObject = stream;
                video.style.transform = isFront ? "scaleX(-1)" : "none";
            } catch (e) { alert("Camera error: " + e); }
        }

        // 2. Focus & Haptic effect
        document.getElementById('camera-wrapper').onclick = (e) => {
            const sq = document.getElementById('focus-square');
            sq.style.left = `${e.clientX - 32}px`;
            sq.style.top = `${e.clientY - 32 - 60}px`;
            sq.style.display = 'block';
            sq.style.transform = 'scale(1.3)';
            setTimeout(() => sq.style.transform = 'scale(1)', 50);
            setTimeout(() => sq.style.display = 'none', 1000);
        };

        // 3. Shutter Logic
        shutter.onclick = () => {
            if (mode === 'photo') {
                capturePhoto();
            } else {
                isRecording ? stopRecording() : startRecording();
            }
        };

        function capturePhoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if(isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0);
            saveItem(canvas.toDataURL('image/jpeg'));
            
            // Shutter blink effect
            video.style.opacity = '0';
            setTimeout(() => video.style.opacity = '1', 50);
        }

        function startRecording() {
            isRecording = true;
            document.body.classList.add('recording');
            document.getElementById('timer').style.display = 'block';
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                saveItem(URL.createObjectURL(blob), true);
                chunks = [];
            };
            recorder.start();
        }

        function stopRecording() {
            isRecording = false;
            document.body.classList.remove('recording');
            document.getElementById('timer').style.display = 'none';
            recorder.stop();
        }

        function saveItem(url) {
            photos.unshift(url);
            latestThumb.src = url;
            latestThumb.style.display = 'block';
        }

        // 4. UI Navigation
        function switchMode(newMode) {
            mode = newMode;
            document.body.className = newMode + '-active';
            document.querySelectorAll('.mode').forEach(m => {
                m.classList.toggle('active', m.innerText.toLowerCase() === newMode);
            });
        }

        function toggleGallery(show) {
            if(show) {
                grid.innerHTML = '';
                photos.forEach(p => {
                    const img = document.createElement('img');
                    img.src = p; img.className = 'grid-img';
                    img.onclick = () => openViewer(p);
                    grid.appendChild(img);
                });
                galleryView.classList.add('open');
            } else {
                galleryView.classList.remove('open');
            }
        }

        function openViewer(src) {
            document.getElementById('full-img').src = src;
            document.getElementById('photo-viewer').style.display = 'flex';
        }

        document.getElementById('close-viewer').onclick = () => {
            document.getElementById('photo-viewer').style.display = 'none';
        };

        document.getElementById('btn-gallery').onclick = () => toggleGallery(true);
        document.getElementById('btn-flip').onclick = () => { isFront = !isFront; initCamera(); };

        // 5. Lifecycle Stop
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stream?.getTracks().forEach(t => t.stop());
            else initCamera();
        });

        initCamera();
    </script>
</body>
</html>
