<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Cam App</title>
    <style>
        :root {
            --primary: #ff4757;
            --dark: #2f3542;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--dark);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* Camera Viewport */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            background: #000;
        }

        video {
            width: 100%;
            height: auto;
            transform: scaleX(-1); /* Mirror view for selfies */
        }

        /* Controls */
        .controls {
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            background: rgba(0,0,0,0.8);
        }

        #snap {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid white;
            background: var(--primary);
            cursor: pointer;
            transition: transform 0.1s;
        }

        #snap:active { transform: scale(0.9); }

        /* Gallery Sidebar/Bottom */
        #gallery {
            width: 100%;
            height: 120px;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            background: #1e2124;
            border-top: 1px solid #3e4444;
        }

        .thumbnail {
            height: 100px;
            min-width: 100px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <button id="snap" title="Take Photo"></button>
    </div>

    <div id="gallery">
        </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const gallery = document.getElementById('gallery');

        // 1. Access the Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera: ", err);
                alert("Camera access denied or not supported.");
            }
        }

        // 2. Capture Photo
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw video frame to canvas
            context.translate(canvas.width, 0);
            context.scale(-1, 1); // Maintain mirror effect in save
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert to Image
            const dataURL = canvas.toDataURL('image/png');
            addToGallery(dataURL);
        });

        // 3. Add to Gallery
        function addToGallery(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'thumbnail';
            img.onclick = () => {
                // Simple download trigger on click
                const link = document.createElement('a');
                link.href = src;
                link.download = `capture_${Date.now()}.png`;
                link.click();
            };
            gallery.prepend(img); // Newest first
        }

        initCamera();
    </script>
</body>
</html>
